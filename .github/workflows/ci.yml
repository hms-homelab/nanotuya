name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libssl-dev libjsoncpp-dev libcurl4-openssl-dev \
            libgtest-dev libgmock-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install openssl jsoncpp googletest

      - name: Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_WITH_CLOUD=ON -DBUILD_EXAMPLES=ON -DBUILD_TESTS=ON ..
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        run: cd build && ctest --output-on-failure
